name: Sync Retrasos Renfe

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar JSON
        run: |
          curl -s "https://tiempo-real.largorecorrido.renfe.com/renfe-visor/flotaLD.json?v=$(date +%s%3N)" -o retrasos.json
          ls -lh retrasos.json

      - name: Commit y Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898752+github-actions[bot]@users.noreply.github.com'
          git add retrasos.json
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "🔄 Retrasos $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
